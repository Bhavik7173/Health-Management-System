version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # We remove the interpolation to force the correct internal address
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=medicore
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
